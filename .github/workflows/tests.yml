name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        run: mypy hallmark/ --ignore-missing-imports
        continue-on-error: true

      - name: Check results freshness
        # Guard against stale baseline result artifacts (task #2): every
        # aggregate result JSON must be newer than, and count-consistent with,
        # the split it scores. `--warn-only` reports without failing while the
        # released results are pending regeneration; drop the flag to make this
        # a hard gate once results are regenerated.
        run: python scripts/check_results_freshness.py --results-dir data/v1.0/baseline_results --data-dir data --version v1.0 --warn-only

      - name: Run tests
        run: pytest --tb=short -q --cov=hallmark --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check dist
        run: |
          pip install twine
          twine check dist/*
